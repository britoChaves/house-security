<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>HouseSecurity</title>
</head>
<body>
    <!-- CABEÇALHO -->
    <header>
        <div class="logo">
            <img src="imagem/logoEmpresa.png" alt="Logo da Empresa">
        </div>

        <!-- MENU DE NAVEGAÇÃO -->
        <nav>
            <ul>
                <li>    <a href="QuemSomos">Quem somos</a> </li>
                <li>    <a href="Produtos">Produtos</a> </li>
                <li>    <a href="Equipe">Nossa equipe</a> </li>
                <li>    <a href="Contato">Entre em contato</a>  </li>
            </ul>
        </nav>
    </header>

    <!-- LISTA DE PRODUTOS -->
    <main>
        <section class="vitrine">

            <!-- BOTÃO ESQUERDO PARA NAVEGAR PELOS PRODUTOS -->
            <button class="esquerdo">
                &#10094;
            </button>

            <!-- IMAGEM DO PRODUTO E DESCRIÇÃO -->
            <div class="produtoPrincipal">
                <div class="produtoImagem">
                    <img id="imagemProduto" src="imagem/placaDissuasoria.png" alt="Placa Dissuasória">
                </div>

                <div class="produtoDesc">
                    <h2 id="nomeProduto">PLACA DISSUASÓRIA</h2>
                    <p id="descProduto">Serve como um aviso de proteção e monitoramento do ambiente. Sua presença ajuda a desencorajar ações suspeitas e possíveis tentativas de invasão.</p>
                </div>
            </div>

            <!-- BOTÃO DIREITO... -->
            <button class="direito">
                &#10095;
            </button>
        </section>
    </main>

    <!-- RODAPÉ -->
    <footer>
        <div class="contatoRodape">Entre em contato conosco:</div>

        <!-- BOTÃO PARA ORÇAMENTO -->
        <div>
            <a href="Contato" class="orcamentoRodape">Seu orçamento aqui!</a>
        </div>
    </footer>

    <script src="script.js"></script>

</body>
</html>
